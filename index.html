<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="10.000 partikülden oluşan fotoğraf animasyonu."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='8' fill='%23f0cb72'/%3E%3C/svg%3E"
    />
    <title>Particle Portrait</title>
  </head>
  <body>
    <main class="stage" aria-label="10.000 partiküllü fotoğraf animasyonu">
      <canvas id="particleCanvas"></canvas>

      <div class="loading" id="loading">Yükleniyor</div>

      <div class="progress-wrap" aria-hidden="true">
        <div class="progress" id="progress"></div>
      </div>

      <div class="controls" aria-label="Animasyon kontrolleri">
        <button class="icon-button" id="replayButton" type="button" title="Yeniden oynat" aria-label="Yeniden oynat">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12a8 8 0 1 0 2.34-5.66" />
            <path d="M4 4v6h6" />
          </svg>
        </button>
        <button class="icon-button" id="scatterButton" type="button" title="Dağıt / topla" aria-label="Dağıt veya topla">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12h.01" />
            <path d="M5 5h.01" />
            <path d="M19 5h.01" />
            <path d="M5 19h.01" />
            <path d="M19 19h.01" />
            <path d="M12 3v3" />
            <path d="M12 18v3" />
            <path d="m4.93 4.93 2.12 2.12" />
            <path d="m16.95 16.95 2.12 2.12" />
            <path d="m19.07 4.93-2.12 2.12" />
            <path d="m7.05 16.95-2.12 2.12" />
          </svg>
        </button>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
